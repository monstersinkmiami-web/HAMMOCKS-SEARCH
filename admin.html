<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Proof — Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400;8..60,600;8..60,700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#16233F; --paper:#F6F3EC; --paper-2:#EFEAE0; --gold:#C8A04D; --gold-dim:#A98A47;
    --ink:#23262B; --ink-soft:#5B6270; --line:#DCD5C5; --err:#A33B3B;
  }
  *{box-sizing:border-box;}
  body{margin:0; background:var(--paper); color:var(--ink); font-family:'Inter',sans-serif;}
  .app{max-width:640px; margin:0 auto; padding:50px 24px 100px;}
  h1{font-family:'Source Serif 4',serif; font-size:26px; color:var(--navy); margin:0 0 4px;}
  .sub{font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--ink-soft); margin-bottom:28px;}
  .panel{background:#fff; border:1px solid var(--line); border-radius:10px; padding:20px; margin-bottom:20px;}
  .dropzone{border:2px dashed var(--line); border-radius:10px; padding:24px 14px; text-align:center; cursor:pointer; background:var(--paper);}
  .dropzone:hover, .dropzone.drag{border-color:var(--gold); background:#FBF7EC;}
  .dropzone .big{font-size:14px; color:var(--navy); font-weight:600; margin-bottom:4px;}
  .dropzone p{margin:0; font-size:13px; color:var(--ink-soft);}
  input[type=file]{display:none;}
  .progress-bar{height:6px; background:var(--paper-2); border-radius:4px; overflow:hidden; margin-top:14px;}
  .progress-fill{height:100%; background:var(--gold); width:0%; transition:width .2s;}
  .progress-label{font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--ink-soft); margin-top:6px; word-break:break-all;}
  .doc-row{display:flex; align-items:center; gap:10px; padding:8px 10px; border:1px solid var(--line); border-radius:6px; background:var(--paper); margin-bottom:6px;}
  .doc-row .ext{font-family:'JetBrains Mono',monospace; font-size:9px; color:#fff; background:var(--navy); border-radius:4px; padding:2px 5px;}
  .doc-row .name{font-size:12.5px; flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .doc-row .del{background:none; border:none; color:var(--err); cursor:pointer; font-size:13px;}
  .lib-empty{font-size:13px; color:var(--ink-soft); padding:18px 6px; text-align:center;}
  .errlist{margin-top:10px; font-size:11.5px; color:var(--err);}
  .gate{display:flex; flex-direction:column; align-items:center; padding-top:120px;}
  .gate input{padding:10px 14px; border:1px solid var(--line); border-radius:8px; font-size:14px; width:240px;}
  .gate button{margin-top:10px; background:var(--navy); color:#fff; border:none; border-radius:8px; padding:9px 20px; cursor:pointer; font-weight:600;}
</style>
</head>
<body>

<div id="gate" class="gate">
  <h1>Proof — Admin</h1>
  <p class="sub">Enter the admin password to manage the document library.</p>
  <input type="password" id="pwInput" placeholder="Admin password">
  <button id="pwBtn">Enter</button>
</div>

<div id="app" class="app" style="display:none;">
  <h1>Proof — Admin</h1>
  <div class="sub">Manage the documents your public search page can draw answers from.</div>

  <div class="panel">
    <div class="dropzone" id="dropzone">
      <div class="big">Drop PDF, DOCX, or TXT files here</div>
      <p>or click to browse</p>
    </div>
    <input type="file" id="fileInput" multiple accept=".pdf,.docx,.txt,.md">
    <div class="progress-bar" id="progressWrap" style="display:none;"><div class="progress-fill" id="progressFill"></div></div>
    <div class="progress-label" id="progressLabel"></div>
    <div class="errlist" id="errList"></div>
  </div>

  <div class="panel">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
      <strong style="font-family:'Source Serif 4',serif; color:var(--navy);">Library</strong>
      <span id="libCount" style="font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--ink-soft);"></span>
    </div>
    <div id="libList"><div class="lib-empty">No documents yet.</div></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
<script>
(function(){
  "use strict";
  let ADMIN_PW = '';

  let pdfjsLib = null;
  try{
    pdfjsLib = window['pdfjsLib'] || window['pdfjs-dist/build/pdf'];
    if(pdfjsLib) pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  }catch(e){}

  async function extractPdfText(arrayBuffer){
    const pdf = await pdfjsLib.getDocument({data: arrayBuffer}).promise;
    let text = '';
    for(let i=1;i<=pdf.numPages;i++){
      const page = await pdf.getPage(i);
      const content = await page.getTextContent();
      text += content.items.map(it=>it.str).join(' ') + '\n\n';
    }
    return text;
  }
  async function extractDocxText(arrayBuffer){
    const result = await window.mammoth.extractRawText({arrayBuffer});
    return result.value;
  }
  async function extractFileText(file){
    const ext = file.name.split('.').pop().toLowerCase();
    if(ext === 'pdf') return await extractPdfText(await file.arrayBuffer());
    if(ext === 'docx') return await extractDocxText(await file.arrayBuffer());
    if(ext === 'txt' || ext === 'md') return await file.text();
    throw new Error('Unsupported file type: .' + ext);
  }

  const dropzone = document.getElementById('dropzone');
  const fileInput = document.getElementById('fileInput');
  const progressWrap = document.getElementById('progressWrap');
  const progressFill = document.getElementById('progressFill');
  const progressLabel = document.getElementById('progressLabel');
  const errList = document.getElementById('errList');
  const libList = document.getElementById('libList');
  const libCount = document.getElementById('libCount');

  async function refreshLibrary(){
    const r = await fetch('/api/docs');
    const data = await r.json();
    libCount.textContent = data.count ? '(' + data.count + ')' : '';
    if(data.count === 0){
      libList.innerHTML = '<div class="lib-empty">No documents yet.</div>';
      return;
    }
    const sorted = [...data.docs].sort((a,b) => b.addedAt - a.addedAt);
    libList.innerHTML = sorted.map(d => `
      <div class="doc-row">
        <span class="ext">${d.type}</span>
        <span class="name" title="${d.name}">${d.name}</span>
        <button class="del" data-id="${d.id}">✕</button>
      </div>
    `).join('');
    libList.querySelectorAll('.del').forEach(btn => {
      btn.addEventListener('click', () => deleteDoc(btn.dataset.id));
    });
  }

  async function deleteDoc(id){
    await fetch('/api/delete', {
      method:'POST',
      headers:{'Content-Type':'application/json','x-admin-password':ADMIN_PW},
      body: JSON.stringify({id})
    });
    refreshLibrary();
  }

  async function uploadDoc(name, type, text){
    const r = await fetch('/api/upload', {
      method:'POST',
      headers:{'Content-Type':'application/json','x-admin-password':ADMIN_PW},
      body: JSON.stringify({name, type, text})
    });
    if(!r.ok){
      const data = await r.json().catch(() => ({}));
      throw new Error(data.error || 'Upload failed');
    }
  }

  async function handleFiles(fileList){
    const files = Array.from(fileList);
    if(files.length === 0) return;
    errList.innerHTML = '';
    const failures = [];
    progressWrap.style.display = 'block';
    for(let i=0;i<files.length;i++){
      const file = files[i];
      progressFill.style.width = Math.round((i/files.length)*100) + '%';
      progressLabel.textContent = `Indexing ${i+1}/${files.length}: ${file.name}`;
      try{
        const text = (await extractFileText(file)).trim();
        if(!text) throw new Error('No readable text found');
        const ext = file.name.split('.').pop().toLowerCase();
        await uploadDoc(file.name, ext, text);
      }catch(e){
        failures.push(file.name + ' — ' + e.message);
      }
      await refreshLibrary();
    }
    progressFill.style.width = '100%';
    progressLabel.textContent = `Done. Indexed ${files.length - failures.length}/${files.length} files.`;
    setTimeout(() => { progressWrap.style.display = 'none'; }, 800);
    if(failures.length) errList.innerHTML = 'Could not index:<br>' + failures.map(f => '• ' + f).join('<br>');
  }

  dropzone.addEventListener('click', () => fileInput.click());
  dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('drag'); });
  dropzone.addEventListener('dragleave', () => dropzone.classList.remove('drag'));
  dropzone.addEventListener('drop', e => { e.preventDefault(); dropzone.classList.remove('drag'); handleFiles(e.dataTransfer.files); });
  fileInput.addEventListener('change', () => handleFiles(fileInput.files));

  // ---- Password gate ----
  const gate = document.getElementById('gate');
  const app = document.getElementById('app');
  const pwInput = document.getElementById('pwInput');
  const pwBtn = document.getElementById('pwBtn');

  async function tryEnter(){
    const pw = pwInput.value;
    // Verify by attempting a harmless authed call (delete with a bogus id just checks auth first)
    const r = await fetch('/api/upload', {
      method:'POST',
      headers:{'Content-Type':'application/json','x-admin-password':pw},
      body: JSON.stringify({})
    });
    if(r.status === 401){
      pwInput.style.borderColor = '#A33B3B';
      pwInput.value = '';
      pwInput.placeholder = 'Wrong password — try again';
      return;
    }
    ADMIN_PW = pw;
    sessionStorage.setItem('proof_admin_pw', pw);
    gate.style.display = 'none';
    app.style.display = 'block';
    refreshLibrary();
  }
  pwBtn.addEventListener('click', tryEnter);
  pwInput.addEventListener('keydown', e => { if(e.key === 'Enter') tryEnter(); });

  const saved = sessionStorage.getItem('proof_admin_pw');
  if(saved){
    pwInput.value = saved;
    tryEnter();
  }
})();
</script>
</body>
</html>
